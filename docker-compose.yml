
services:
  mongo:
    image: mongo:6.0
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - mern-net
  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    depends_on:
      - mongo
    networks:
      - mern-net


  frontend:
    build: 
      context: ./client
      dockerfile: dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./client/.env
    depends_on:
      - backend
    networks:
      - mern-net
  
volumes:
  mongo-data:
  
networks:
  mern-net:
    driver: bridge

    