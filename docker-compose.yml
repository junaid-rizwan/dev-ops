
services:
  backend:
    build: ./server
    container_name: backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env


  frontend:
    build: ./client
    container_name: frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./client/.env

    